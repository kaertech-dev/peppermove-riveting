# ============================================================
#  Suitboard Riveting – Web App Config
#  Edit this file without touching app.py
# ============================================================


# ------------------------------------------------------------
[database]
# ------------------------------------------------------------
host     = 192.168.2.5
user     = labeling
password = labeling


# ------------------------------------------------------------
[tables]
# ------------------------------------------------------------
suitboard_sizes    = peppermove.suitboard_sizes
suitboard_main     = peppermove.suitboard_main
suitboard_riveting = peppermove.suitboard_riveting_new
operators          = operators.main


# ------------------------------------------------------------
[queries]
# ------------------------------------------------------------

check_operator =
    SELECT 1 FROM {operators}
    WHERE operator_en = %s
    LIMIT 1

fetch_suit_sizes =
    SELECT suitboard_size
    FROM {suitboard_sizes}
    ORDER BY suitboard_size

serial_exists_in_main =
    SELECT 1 FROM {suitboard_main}
    WHERE serial_num = %s
    LIMIT 1

fetch_po_num =
    SELECT po_num FROM {suitboard_main}
    WHERE serial_num = %s
    LIMIT 1

get_riveting_records =
    SELECT serial_num, po_num, operator_en, shift,
           date_time, suit_size, remarks, status
    FROM {suitboard_riveting}
    ORDER BY date_time DESC
    LIMIT %s

insert_riveting_record =
    INSERT INTO {suitboard_riveting}
        (serial_num, po_num, operator_en, shift,
         date_time, suit_size, remarks, status)
    VALUES
        (%(serial_num)s, %(po_num)s, %(operator_en)s, %(shift)s,
         %(date_time)s, %(suit_size)s, %(remarks)s, %(status)s)


# ------------------------------------------------------------
[app]
# ------------------------------------------------------------
window_title = Suitboard Riveting
shifts       = A, B


# ------------------------------------------------------------
[csv]
# ------------------------------------------------------------
enabled     = true
save_folder = ./exports
filename    = suitboard_riveting_{date}.csv
headers     = serial_num, po_num, operator_en, shift, date_time, suit_size, remarks, status
