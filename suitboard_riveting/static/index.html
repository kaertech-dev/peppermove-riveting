<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suitboard Riveting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Arial+Unicode+MS&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── OUTER WINDOW FRAME ── */
    .window-frame {
      margin: 12px auto;
      width: 860px;
      background: #fff;
      border: 1px solid #999;
      box-shadow: 2px 2px 6px rgba(0,0,0,.2);
    }

    /* ── MENU BAR ── */
    .menubar {
      background: #f0f0f0;
      border-bottom: 1px solid #aaa;
      padding: 2px 6px;
      font-size: 12px;
      color: #222;
      height: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .menubar span { cursor: default; padding: 1px 4px; }
    .menubar span:hover { background: #0078d7; color: #fff; }

    /* ── CENTRAL WIDGET (white area) ── */
    .central {
      background: #fff;
      padding: 10px;
      position: relative;
    }

    /* ── TOP HEADER BAR (widget_2) ── */
    .header-bar {
      border: 1px solid #000;
      height: 91px;
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      background: #fff;
      position: relative;
    }

    .header-logo {
      width: 181px;
      height: 91px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      flex-shrink: 0;
    }
    .header-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .header-logo-placeholder {
      font-size: 13px;
      font-weight: 600;
      color: #c0392b;
      letter-spacing: 0.03em;
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-family: 'Arial Unicode MS', Arial, sans-serif;
    }

    .header-image {
      width: 171px;
      height: 91px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-image img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── MAIN BODY (below header) ── */
    .body-row {
      display: flex;
      gap: 0;
      height: 341px;
    }

    /* ── LEFT: TABLE AREA (columnView) ── */
    .table-area {
      width: 581px;
      border: 1px solid #bbb;
      background: #fff;
      overflow: auto;
      flex-shrink: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    thead th {
      background: #e8e8e8;
      border: 1px solid #ccc;
      padding: 4px 6px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:nth-child(even) { background: #f7f7f7; }
    tbody tr:hover { background: #ddeeff; }
    tbody td {
      border: 1px solid #e0e0e0;
      padding: 3px 6px;
      font-size: 11px;
      white-space: nowrap;
    }
    .td-pass { color: #1a7a3a; font-weight: 600; }
    .td-fail { color: #c0392b; font-weight: 600; }

    .empty-row td {
      text-align: center;
      color: #999;
      padding: 20px;
      font-style: italic;
    }

    /* ── RIGHT SIDE ── */
    .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-left: 10px;
    }

    /* ── LOGIN BOX (widget_3) ── */
    .login-box {
      border-left: 2px solid #aaa;
      border-bottom: 2px solid #aaa;
      padding: 10px 12px 14px 18px;
      margin-bottom: 6px;
      background: #fff;
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 6px;
    }
    .form-row label {
      font-size: 8px;
      color: #333;
      width: 90px;
      flex-shrink: 0;
    }
    .form-row input,
    .form-row select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #aaa;
      background: #fff;
      color: #222;
      height: 22px;
      width: 110px;
    }
    .form-row input:focus,
    .form-row select:focus {
      outline: 1px solid #0078d7;
    }
    .form-row input:disabled,
    .form-row select:disabled {
      background: #f5f5f5;
      color: #888;
      cursor: not-allowed;
    }

    .btn-login {
      font-size: 11px;
      padding: 2px 10px;
      height: 20px;
      border: 1px solid #888;
      background: #e8e8e8;
      cursor: pointer;
      margin-left: auto;
      display: block;
    }
    .btn-login:hover:not(:disabled) { background: #d0d0d0; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .btn-login.logged-in { background: #c8e6c9; border-color: #4caf50; }

    /* ── SCAN BOX (widget_4) ── */
    .scan-box {
      padding: 10px 12px 14px 12px;
      background: #fff;
      flex: 1;
    }

    .scan-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 6px;
    }
    .scan-row label {
      font-size: 9px;
      color: #333;
      width: 72px;
      flex-shrink: 0;
    }
    .scan-row input,
    .scan-row select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #000;
      background: #fff;
      color: #222;
      height: 22px;
      flex: 1;
    }
    .scan-row input:focus { outline: 1px solid #0078d7; }
    .scan-row input:disabled,
    .scan-row select:disabled {
      background: #f5f5f5;
      color: #888;
      cursor: not-allowed;
      border-color: #aaa;
    }

    .status-label {
      font-size: 11px;
      min-height: 32px;
      padding: 4px 6px;
      word-break: break-word;
      color: #333;
      border: 1px solid transparent;
      border-radius: 2px;
      margin-bottom: 8px;
    }
    .status-label.ok   { color: #1a7a3a; background: #f0fff4; border-color: #a8d5b5; }
    .status-label.err  { color: #c0392b; background: #fff5f5; border-color: #f5c6c6; }
    .status-label.warn { color: #856404; background: #fffbea; border-color: #fdeaa7; }

    .btn-submit {
      font-size: 12px;
      padding: 3px 16px;
      height: 28px;
      border: 1px solid #888;
      background: #e8e8e8;
      cursor: pointer;
      float: right;
    }
    .btn-submit:hover:not(:disabled) { background: #d0d0d0; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* ── STATUS BAR ── */
    .statusbar {
      background: #f0f0f0;
      border-top: 1px solid #aaa;
      padding: 2px 8px;
      font-size: 11px;
      color: #333;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .statusbar-sep { color: #bbb; }

    /* ── SPIN ── */
    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="window-frame">

  <!-- MENU BAR -->
  <!-- <div class="menubar">
    <span>File</span>
    <span>Edit</span>
    <span>View</span>
    <span>Help</span>
  </div> -->

  <!-- CENTRAL WIDGET -->
  <div class="central">

    <!-- HEADER (widget_2) -->
    <div class="header-bar">
      <!-- <div class="header-logo">
        <span class="header-logo-placeholder">PEPPER</span>
      </div> -->
      <div class="header-title">Suit Size</div>
      <!-- <div class="header-image">
        <span style="font-size:11px;color:#aaa;">[image]</span>
      </div> -->
    </div>

    <!-- BODY ROW -->
    <div class="body-row">

      <!-- LEFT: TABLE (columnView) -->
      <!-- <div class="table-area" id="table-area">
        <table>
          <thead>
            <tr>
              <th>serial_num</th>
              <th>po_num</th>
              <th>operator_en</th>
              <th>shift</th>
              <th>date_time</th>
              <th>suit_size</th>
              <th>remarks</th>
              <th>status</th>
            </tr>
          </thead>
          <tbody id="tbl-body">
            <tr class="empty-row"><td colspan="8">Loading…</td></tr>
          </tbody>
        </table>
      </div> -->

      <!-- RIGHT COL -->
      <div class="right-col">

        <!-- LOGIN (widget_3) -->
        <div class="login-box">
          <div class="form-row">
            <label for="inp-emp">employee_num:</label>
            <input id="inp-emp" type="text" autocomplete="off" spellcheck="false" />
          </div>
          <div class="form-row">
            <label for="inp-shift">Shift:</label>
            <select id="inp-shift">
              <option>A</option>
              <option>B</option>
            </select>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:4px">
            <button class="btn-login" id="btn-login">login</button>
          </div>
        </div>

        <!-- SCAN (widget_4) -->
        <div class="scan-box">
          <div class="scan-row">
            <label for="inp-serial">Scan here:</label>
            <input id="inp-serial" type="text" autocomplete="off"
                   spellcheck="false" disabled />
          </div>
          <div class="scan-row">
            <label for="inp-size">Suit size:</label>
            <select id="inp-size" disabled>
              <option value="">(loading…)</option>
            </select>
          </div>
          <div class="status-label" id="status-label"></div>
          <div style="overflow:hidden">
            <button class="btn-submit" id="btn-submit" disabled>Submit</button>
          </div>
        </div>

      </div><!-- /right-col -->
    </div><!-- /body-row -->
  </div><!-- /central -->

  <!-- STATUS BAR -->
  <div class="statusbar" id="statusbar">
    <span id="sb-text">Not logged in.</span>
  </div>

</div><!-- /window-frame -->

<script>
  const $ = id => document.getElementById(id);
  let state = { loggedIn: false, operator: '', shift: 'A' };

  // ── DOM ──
  const inpEmp    = $('inp-emp');
  const inpShift  = $('inp-shift');
  const inpSerial = $('inp-serial');
  const inpSize   = $('inp-size');
  const btnLogin  = $('btn-login');
  const btnSubmit = $('btn-submit');
  const sbText    = $('sb-text');
  const statusLbl = $('status-label');
  const tblBody   = $('tbl-body');

  function setStatus(msg, type = '') {
    statusLbl.textContent = msg;
    statusLbl.className = 'status-label' + (type ? ' ' + type : '');
  }

  function setSB(msg) { sbText.textContent = msg; }

  function setScanEnabled(on) {
    inpSerial.disabled = !on;
    inpSize.disabled   = !on;
    btnSubmit.disabled = !on;
  }

  // ── Load suit sizes ──
  async function loadSizes() {
    try {
      const res  = await fetch('/api/suit-sizes');
      const data = await res.json();
      if (data.ok && data.sizes.length) {
        inpSize.innerHTML = data.sizes
          .map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
      } else {
        inpSize.innerHTML = '<option>(no sizes loaded)</option>';
      }
    } catch { inpSize.innerHTML = '<option>(error)</option>'; }
  }

  // ── Load table ──
  async function loadRecords() {
    try {
      const res  = await fetch('/api/records?limit=200');
      const data = await res.json();
      if (!data.ok || !data.records.length) {
        tblBody.innerHTML = '<tr class="empty-row"><td colspan="8">No records yet.</td></tr>';
        return;
      }
      tblBody.innerHTML = data.records.map(r => {
        const st = r.status == 1 ? '<span class="td-pass">1</span>' : '<span class="td-fail">0</span>';
        return `<tr>
          <td>${esc(r.serial_num||'')}</td>
          <td>${esc(r.po_num||'')}</td>
          <td>${esc(r.operator_en||'')}</td>
          <td>${esc(r.shift||'')}</td>
          <td>${esc(r.date_time||'')}</td>
          <td>${esc(r.suit_size||'')}</td>
          <td>${esc(r.remarks||'')}</td>
          <td>${st}</td>
        </tr>`;
      }).join('');
    } catch (e) {
      tblBody.innerHTML = `<tr class="empty-row"><td colspan="8">Error: ${esc(e.message)}</td></tr>`;
    }
  }

  // ── Login ──
  async function doLogin() {
    const emp = inpEmp.value.trim().toUpperCase();
    if (!emp) { setStatus('Please enter your employee number.', 'warn'); return; }

    btnLogin.disabled = true;
    btnLogin.innerHTML = '<span class="spin"></span>…';

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employee_num: emp }),
      });
      const data = await res.json();

      if (!data.ok) {
        setStatus(data.error, 'err');
        btnLogin.disabled = false;
        btnLogin.textContent = 'login';
        return;
      }

      state.loggedIn = true;
      state.operator = emp;
      state.shift    = inpShift.value;

      inpEmp.disabled   = true;
      inpShift.disabled = true;
      btnLogin.textContent = '✓ logged in';
      btnLogin.className   = 'btn-login logged-in';
      setScanEnabled(true);
      inpSerial.focus();
      setSB(`Logged in: ${emp} | Shift: ${state.shift}`);
      setStatus(`Welcome, ${emp}! Scan a serial number.`, 'ok');

    } catch (e) {
      setStatus(`Network error: ${e.message}`, 'err');
      btnLogin.disabled = false;
      btnLogin.textContent = 'login';
    }
  }

  // ── Scan (Enter in serial field) ──
  async function doScanCheck() {
    if (!state.loggedIn) return;
    const serial = inpSerial.value.trim();
    if (!serial) return;

    setStatus('Looking up serial…');
    try {
      const res  = await fetch('/api/check-serial', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ serial_num: serial }),
      });
      const data = await res.json();
      if (!data.ok) { setStatus(data.error, 'err'); inpSerial.select(); return; }
      setStatus(`✔ Serial '${serial}' found. Select size & submit.`, 'ok');
    } catch (e) { setStatus(`Network error: ${e.message}`, 'err'); }
  }

  // ── Submit ──
  async function doSubmit() {
    if (!state.loggedIn) return;
    const serial = inpSerial.value.trim();
    const size   = inpSize.value.trim();
    if (!serial) { setStatus('Please scan a serial number.', 'warn'); return; }
    if (!size || size === '(no sizes loaded)') { setStatus('Please select a valid suit size.', 'warn'); return; }

    btnSubmit.disabled = true;
    btnSubmit.innerHTML = '<span class="spin"></span>…';
    setStatus('Saving…');

    try {
      const res  = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          serial_num:  serial,
          suit_size:   size,
          operator_en: state.operator,
          shift:       state.shift,
        }),
      });
      const data = await res.json();

      if (!data.ok) {
        setStatus(data.error, 'err');
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Submit';
        return;
      }

      setStatus(`✔ Saved! Serial: ${serial}  |  Size: ${size}  |  PO: ${data.po_num||'—'}`, 'ok');
      setSB(`Logged in: ${state.operator} | Shift: ${state.shift} | Last: ${serial}`);
      inpSerial.value = '';
      inpSerial.focus();
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Submit';
      loadRecords();

    } catch (e) {
      setStatus(`Network error: ${e.message}`, 'err');
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Submit';
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Events ──
  btnLogin.addEventListener('click', doLogin);
  inpEmp.addEventListener('keydown',    e => e.key === 'Enter' && doLogin());
  inpSerial.addEventListener('keydown', e => e.key === 'Enter' && doScanCheck());
  btnSubmit.addEventListener('click',   doSubmit);
  inpEmp.addEventListener('input', () => { inpEmp.value = inpEmp.value.toUpperCase(); });

  // ── Init ──
  loadSizes();
  loadRecords();
  inpEmp.focus();
</script>
</body>
</html>
